<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migration Dashboard Login</title>
    <link rel="stylesheet" href="css/login.css">
    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 28px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(34, 44, 58, 0.16);
            box-sizing: border-box;
        }

        .login-logo {
            display: block;
            max-width: 180px;
            max-height: 56px;
            margin: 0 auto 20px;
            object-fit: contain;
        }

        h1 {
            margin: 0 0 24px;
            color: #1d2d3e;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: #243447;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid #b8c4d0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            width: 100%;
            height: 44px;
            margin-top: 22px;
            border: 0;
            border-radius: 6px;
            background: #0a6ed1;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.75;
        }

        .message {
            min-height: 20px;
            margin-top: 14px;
            color: #b00020;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <form class="login-card" id="loginForm">
            <img class="login-logo" src="images/logo-img.png" alt="">
            <h1>Migration Dashboard</h1>

            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button id="loginButton" type="submit">Login</button>
            <div class="message" id="message" role="alert"></div>
        </form>
    </main>

    <script>
        const form = document.getElementById("loginForm");
        const button = document.getElementById("loginButton");
        const message = document.getElementById("message");

        form.addEventListener("submit", async event => {
            event.preventDefault();
            message.textContent = "";
            button.disabled = true;
            button.textContent = "Logging in...";

            try {
                const response = await fetch("/odata/v4/datamigration/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value
                    })
                });

                if (!response.ok) throw new Error("Login service is not available");

                const data = await response.json();
                if (data.value === true) {
                    window.location.href = "/project1/app.html#/Waves";
                    return;
                }

                message.textContent = "Invalid username or password";
            } catch (error) {
                message.textContent = error.message || "Unable to login";
            } finally {
                button.disabled = false;
                button.textContent = "Login";
            }
        });
    </script>
</body>
</html>
